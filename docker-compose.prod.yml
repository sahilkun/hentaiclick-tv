services:
  app:
    build: .
    restart: unless-stopped
    expose:
      - "3000"
    env_file:
      - .env.production
    depends_on:
      meilisearch:
        condition: service_healthy
    networks:
      - internal
      - supabase_default

  meilisearch:
    image: getmeili/meilisearch:v1.12
    restart: unless-stopped
    expose:
      - "7700"
    volumes:
      - meilisearch_data:/meili_data
    environment:
      - MEILI_MASTER_KEY=${MEILISEARCH_ADMIN_KEY}
      - MEILI_ENV=production
      - MEILI_NO_ANALYTICS=true
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7700/health"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - internal

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - app
    networks:
      - internal

networks:
  internal:
    driver: bridge
  supabase_default:
    external: true

volumes:
  meilisearch_data:
